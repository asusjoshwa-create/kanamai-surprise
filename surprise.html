<!DOCTYPE html>
<html>
<head>
<title>Surprise</title>
<link rel="stylesheet" href="style.css">

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

/* Background */
body.surprise{
background: linear-gradient(135deg, #ff4d6d, #ff9a9e);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* Gift Box */
.gift-box{
width:150px;
height:150px;
background:#ff2e63;
position:relative;
cursor:pointer;
border-radius:10px;
animation:float 2s infinite ease-in-out;
}

/* Ribbon vertical */
.gift-box::before{
content:"";
position:absolute;
width:30px;
height:100%;
background:white;
left:50%;
transform:translateX(-50%);
}

/* Ribbon horizontal */
.gift-box::after{
content:"";
position:absolute;
height:30px;
width:100%;
background:white;
top:50%;
transform:translateY(-50%);
}

/* Lid */
.lid{
width:160px;
height:40px;
background:#ff2e63;
position:absolute;
top:-40px;
left:-5px;
border-radius:5px;
transition:0.6s;
}

/* Open animation */
.open .lid{
transform:translateY(-120px) rotate(-20deg);
}

/* Hidden message */
.message{
opacity:0;
transform:scale(0);
transition:0.5s;
color:white;
text-align:center;
}

.open .message{
opacity:1;
transform:scale(1);
}

/* Floating animation */
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

</style>

</head>

<body class="surprise">

<div id="gift" onclick="openGift()">

<div class="gift-box">
<div class="lid"></div>
</div>

<div class="message">
<h1>🎉 Surprise Kanamai 🎉</h1>
<p>You are truly special to me 💖</p>
<div style="font-size:60px;">❤️</div>
</div>

</div>

<!-- 🎵 Music -->
<audio id="bg-music" loop>
<source src="music/song.mp3" type="audio/mpeg">
</audio>

<script>

function openGift(){

// Open animation
document.getElementById("gift").classList.add("open");

// 🎵 Play Music
let music = document.getElementById("bg-music");
music.play();
music.volume = 0.5;

// 🎉 Confetti Blast
confetti({
particleCount: 300,
spread: 150,
origin: { y: 0.6 }
});

// ✨ Continuous Confetti
setInterval(() => {
confetti({
particleCount: 40,
spread: 70,
origin: { x: Math.random(), y: 0 }
});
}, 1200);

}

</script>

</body>
</html>
